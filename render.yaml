services:
  - type: web
    name: bser-backend
    runtime: docker
    plan: free
    rootDir: emotion-detection/backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FFMPEG_BIN
        value: ffmpeg
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_UPLOAD_MB
        value: "15"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_SITE_NAME
        sync: false
      - key: LLM_API_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: z-ai/glm-4.5-air:free
